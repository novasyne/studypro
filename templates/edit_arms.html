{% extends "base.html" %}

{% block title %}Edit Study Arms{% endblock %}

{% block head %}
{{ super() }}
{% endblock %}

{% block content %}

<body data-page-name="edit_arms">
    <br/><br/>
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">{{ study.name }}</h3>
                    </div>
                    <div class="card-body">
                        <form method="POST" action="{{ url_for('edit_arms', study_id=study.study_id) }}">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Arm Name</th>
                                        <th>Description</th>
                                        <th class="text-center" style="width: 120px;">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {% for arm in arms_data %}
                                    <tr>
                                        <td>
                                            <input type="hidden" name="arm_id_{{ loop.index0 }}"
                                                value="{{ arm.get('arm_id', '') }}">
                                            <input type="text" name="arm_name_{{ loop.index0 }}"
                                                value="{{ arm.get('arm_name', '') }}" class="form-control"
                                                placeholder="e.g., Control Group">
                                        </td>
                                        <td>
                                            <input type="text" name="description_{{ loop.index0 }}"
                                                value="{{ arm.get('description', '') }}" class="form-control"
                                                placeholder="e.g., Receives placebo">
                                        </td>
                                        <td class="text-center">
                                            <button type="submit" name="action" value="remove_{{ loop.index0 }}"
                                                class="btn btn-sm btn-danger"><i
                                                    class="bi bi-trash button-icon me-1"></i>Remove</button>
                                        </td>
                                    </tr>
                                    {% endfor %}
                                </tbody>
                            </table>
                            <br/>
                            <div class="d-flex justify-content-end mb-3">
                                <button type="submit" name="action" value="add_arm" class="btn btn-primary"><i
                                        class="bi bi-plus-square button-icon me-1"></i>Add
                                    Arm</button>
                            </div>

                            <hr class="mt-4">

                            <div class="d-flex" style="justify-content: right;">
                                <div>
                                    <button type="submit" name="action" value="save_changes"
                                        class="btn btn-primary me-2"><i
                                            class="bi bi-plus-square button-icon me-1"></i>Save
                                        Changes</button>
                                    <a href="{{ url_for('edit_study', study_id=study.study_id) }}"
                                        class="btn btn-secondary me-2"><i
                                            class="bi bi-x-circle button-icon me-1"></i>Close</a>

                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
{% endblock %}
